_schema-version: "3.1"
ID: employee-ui5
description: UI5 Employee Management App
version: 1.0.0

modules:
  - name: employee-ui5-app
    type: staticfile
    path: dist
    parameters:
      memory: 64M
      disk-quota: 512M
      buildpack: staticfile_buildpack
    build-parameters:
      builder: custom
      commands:
        - npm run build
      build-result: dist
    requires:
      - name: employee-xsuaa
      - name: employee-ui5-destination-service
    properties:
      TENANT_HOST_PATTERN: "^(.*)-b0362cb0trial-dev-employee-ui5-app.cfapps.us10-001.hana.ondemand.com"

resources:
  - name: employee-xsuaa
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: employee-xsuaa

  - name: employee-ui5-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: employee-service-api
                ProxyType: Internet
                Type: HTTP
                URL: https://b0362cb0trial-dev-employee-service-srv.cfapps.us10-001.hana.ondemand.com
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
            existing_destinations_policy: update
        version: 1.0.0
