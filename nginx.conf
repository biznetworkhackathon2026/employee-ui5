worker_processes 1;
daemon off;

error_log stderr;
events { worker_connections 1024; }

http {
    charset utf-8;
    log_format cloudfoundry 'NginxLog "$request" $status $body_bytes_sent';
    access_log /dev/stdout cloudfoundry;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30;

    include mime.types;
    # Ensure proper MIME for UI5
    types {
        application/javascript js mjs;
        application/json json;
        text/css css;
    }

    server {
        listen {{port}};
        server_name localhost;
        root /home/vcap/app;
        index index.html;

        # Proxy /employee/* to the CAP backend
        location /employee/ {
            proxy_pass https://biznetworkhackathon2026-employee-service.cfapps.us10-001.hana.ondemand.com/employee/;
            proxy_http_version 1.1;
            proxy_set_header Host biznetworkhackathon2026-employee-service.cfapps.us10-001.hana.ondemand.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            # Allow PATCH/POST/DELETE
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
        }

        # Serve static files; fall back to index.html for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
