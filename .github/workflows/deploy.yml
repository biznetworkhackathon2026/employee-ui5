name: Deploy to CF on PR Merge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy UI5 to Cloud Foundry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build UI5 app
        run: npm run build

      - name: Install CF CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" | tar -zx
          sudo mv cf8 /usr/local/bin/cf
          cf --version

      - name: CF Login
        run: |
          cf login \
            -a "${{ secrets.CF_API }}" \
            -u "${{ secrets.CF_USERNAME }}" \
            -p "${{ secrets.CF_PASSWORD }}" \
            -o "${{ secrets.CF_ORG }}" \
            -s "${{ secrets.CF_SPACE }}"

      - name: Push to CF
        run: |
          cf push employee-ui5-app \
            -p dist \
            -b staticfile_buildpack \
            -m 64M \
            --no-start

      - name: Map friendly route
        run: |
          cf map-route employee-ui5-app cfapps.us10-001.hana.ondemand.com \
            --hostname biznetworkhackathon2026-employee-ui5 || true

      - name: Start app
        run: cf start employee-ui5-app
