specVersion: "3.0"
metadata:
  name: employee-ui5
type: application
framework:
  name: OpenUI5
  version: "1.120.1"
  libraries:
    - name: sap.ui.core
    - name: sap.m
    - name: sap.f
    - name: sap.ui.layout
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /employee
      configuration:
        baseUri: http://localhost:4004/employee
        strictSSL: false
